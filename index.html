<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Rivals 任務中心</title>

    <link rel="stylesheet" href="css/style.css">

    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
</head>

<body>

<div class="background-glow"></div>
<div class="particles"></div>
    
<nav>

    <div class="logo">
        ⚔ Rivals 任務中心
    </div>

    <ul>

        <li><a href="#">首頁</a></li>

    </ul>

</nav>

<header class="hero">

    <div class="hero-content">

        <h1>
            Rivals Battle Pass
        </h1>

        <p>
            完成每日任務、累積 R 幣、解鎖 Battle Pass 獎勵。
        </p>

        <button id="startBtn">
            開始挑戰 →
        </button>

    </div>

</header>

<main>

<section class="cards">

<div class="card">

<h2>👤 玩家資訊</h2>

<p>玩家：<span id="username">Guest</span></p>

<p>等級：Lv.1</p>

</div>

<div class="card">

<h2>💰 R 幣</h2>

<h1 id="coins">
0
</h1>

</div>

<div class="card">

<h2>🎫 Battle Pass</h2>

<div class="progress">

<div class="progress-bar" style="width:20%"></div>

</div>

<p>20 / 100 EXP</p>

</div>

</section>

</main>

<script src="js/script.js"></script>

</body>
</html>
